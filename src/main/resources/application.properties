spring.application.name=fasteat

# Default runtime profile for local IDE/dev startup.
spring.profiles.default=${SPRING_PROFILES_DEFAULT:local}

# Shared datasource keys (profile-specific values defined in local/test).
spring.datasource.url=${FASTEAT_DB_URL:}
spring.datasource.username=${FASTEAT_DB_USERNAME:}
spring.datasource.password=${FASTEAT_DB_PASSWORD:}
spring.datasource.driver-class-name=${FASTEAT_DB_DRIVER:org.postgresql.Driver}

# Shared JPA baseline for single-module startup.
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Shared logging baseline.
logging.level.root=INFO
logging.level.com.gerolori.fasteat=INFO
logging.level.org.springframework=INFO

# Placeholder auth/JWT settings (security hardening deferred).
fasteat.security.jwt.secret=${FASTEAT_JWT_SECRET:local-dev-jwt-secret-change-me}
fasteat.security.jwt.expiration-ms=${FASTEAT_JWT_EXPIRATION_MS:3600000}
fasteat.security.jwt.issuer=${FASTEAT_JWT_ISSUER:fasteat-local}
