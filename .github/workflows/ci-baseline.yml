name: CI Baseline

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven verify quality gates (Spotless, Checkstyle, SpotBugs)
        run: ./mvnw.cmd -B verify

  container-build-validation:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend container image
        run: docker build --file Dockerfile --tag fast-eat-backend:ci .
