# Test profile overrides for isolated test runs.
spring.datasource.url=jdbc:h2:mem:fasteat-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

logging.level.com.gerolori.fasteat=INFO
logging.level.org.hibernate.SQL=WARN

fasteat.security.jwt.secret=${FASTEAT_TEST_JWT_SECRET:test-jwt-secret-only}
fasteat.security.jwt.expiration-ms=${FASTEAT_TEST_JWT_EXPIRATION_MS:60000}
fasteat.security.jwt.issuer=${FASTEAT_TEST_JWT_ISSUER:fasteat-test}
