# Local IDE/dev profile defaults (single-module baseline).
spring.datasource.url=${FASTEAT_DB_URL:jdbc:postgresql://localhost:5432/fasteat}
spring.datasource.username=${FASTEAT_DB_USERNAME:postgres}
spring.datasource.password=${FASTEAT_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${FASTEAT_DB_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${FASTEAT_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${FASTEAT_JPA_SHOW_SQL:true}

logging.level.com.gerolori.fasteat=${FASTEAT_APP_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.SQL=${FASTEAT_SQL_LOG_LEVEL:DEBUG}
