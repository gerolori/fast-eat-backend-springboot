# Docker/container runtime profile.
spring.datasource.url=${FASTEAT_DB_URL:jdbc:postgresql://postgres:5432/fasteat}
spring.datasource.username=${FASTEAT_DB_USERNAME:fasteat}
spring.datasource.password=${FASTEAT_DB_PASSWORD:fasteat}
spring.datasource.driver-class-name=${FASTEAT_DB_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${FASTEAT_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${FASTEAT_JPA_SHOW_SQL:false}

logging.level.com.gerolori.fasteat=${FASTEAT_APP_LOG_LEVEL:INFO}

fasteat.seed.demo.enabled=${FASTEAT_SEED_DEMO_ENABLED:false}
fasteat.security.admin-bootstrap.enabled=${FASTEAT_ADMIN_BOOTSTRAP_ENABLED:false}
fasteat.security.admin-bootstrap.admin-emails=${FASTEAT_ADMIN_BOOTSTRAP_EMAILS:admin@fasteat.local}
fasteat.security.admin-bootstrap.create-missing-users=${FASTEAT_ADMIN_BOOTSTRAP_CREATE_MISSING_USERS:false}
fasteat.security.admin-bootstrap.default-password=${FASTEAT_ADMIN_BOOTSTRAP_PASSWORD:}
